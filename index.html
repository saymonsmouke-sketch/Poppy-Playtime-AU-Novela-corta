<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎪 Playcare — Живые Игрушки</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0e0720;
    --bg2:       #1a0e35;
    --bg3:       #251548;
    --card:      #1f1040;
    --border:    #3d246b;
    --accent:    #7c3aed;
    --accent2:   #c084fc;
    --accent3:   #f0abfc;
    --text:      #f0e4ff;
    --text2:     #c4a8e8;
    --text3:     #8b6aaa;
    --good:      #34d399;
    --neutral:   #fbbf24;
    --evil:      #f87171;
    --bar-h:     56px;
    --hub-h:     80px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    overflow: hidden;
  }

  /* ── SCREENS ── */
  .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
  .screen.active { display: flex; }

  /* ─────────────────── TITLE SCREEN ─────────────────── */
  #screen-title {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 30%, #2d0f5c 0%, #0e0720 70%);
    gap: 12px;
    padding: 40px 20px;
  }

  .title-glow {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 8vw, 4rem);
    font-weight: 700;
    color: var(--accent3);
    text-shadow: 0 0 40px #c084fc88, 0 0 80px #7c3aed44;
    letter-spacing: 0.04em;
    text-align: center;
    line-height: 1.1;
  }
  .title-sub {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--text3);
    font-size: 1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .title-emoji { font-size: 3rem; margin-bottom: 8px; filter: drop-shadow(0 0 16px #c084fc); }
  .title-rule { width: 180px; height: 1px; background: linear-gradient(90deg,transparent,var(--border),transparent); margin: 16px 0; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 32px; border-radius: 50px; border: none; cursor: pointer;
    font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    outline: none;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #5b21b6);
    color: #fff;
    box-shadow: 0 4px 24px #7c3aed66;
  }
  .btn-primary:hover { box-shadow: 0 6px 32px #7c3aedaa; transform: translateY(-1px); }
  .btn-secondary {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent3); }
  .btn-sm { padding: 8px 20px; font-size: 0.88rem; }
  .btn-danger { background: linear-gradient(135deg,#7f1d1d,#dc2626); color:#fff; }

  /* ─────────────────── CHARACTER CREATION ─────────────────── */
  #screen-create {
    flex-direction: column;
    align-items: center;
    overflow-y: auto;
    padding: 40px 20px 60px;
    background: radial-gradient(ellipse at 50% 0%, #2d0f5c44 0%, transparent 60%), var(--bg);
  }

  .create-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--accent3);
    margin-bottom: 6px;
    text-align: center;
  }
  .create-subtitle { color: var(--text3); font-size: 0.9rem; margin-bottom: 28px; text-align: center; }

  .create-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    width: 100%; max-width: 460px;
    display: flex; flex-direction: column; gap: 20px;
  }

  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-label { font-size: 0.82rem; font-weight: 700; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }

  .form-input {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 14px; color: var(--text); font-family: 'Nunito', sans-serif; font-size: 1rem;
    outline: none; transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent2); }

  .emoji-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;
  }
  .emoji-btn {
    aspect-ratio: 1; border-radius: 12px; border: 2px solid var(--border);
    background: var(--bg3); font-size: 1.5rem; cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center;
  }
  .emoji-btn:hover { border-color: var(--accent2); background: var(--bg2); }
  .emoji-btn.selected { border-color: var(--accent); background: #3b1d7a; box-shadow: 0 0 12px #7c3aed66; transform: scale(1.08); }

  .gender-row { display: flex; gap: 10px; }
  .gender-btn {
    flex: 1; padding: 10px; border-radius: 12px; border: 2px solid var(--border);
    background: var(--bg3); color: var(--text2); font-family: 'Nunito',sans-serif;
    font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.15s;
  }
  .gender-btn.selected { border-color: var(--accent); background: #3b1d7a; color: var(--accent3); }

  .preview-toy {
    text-align: center; padding: 16px; background: var(--bg2); border-radius: 14px;
    border: 1px dashed var(--border);
  }
  .preview-emoji { font-size: 3.5rem; display: block; margin-bottom: 6px; filter: drop-shadow(0 0 10px #c084fc66); }
  .preview-name { font-weight: 800; font-size: 1.1rem; color: var(--accent3); }
  .preview-meta { color: var(--text3); font-size: 0.85rem; margin-top: 2px; }

  /* ─────────────────── GAME SCREEN ─────────────────── */
  #screen-game {
    flex-direction: column;
    background: var(--bg);
  }

  /* TOP BAR */
  #topbar {
    height: var(--bar-h);
    min-height: var(--bar-h);
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 16px; gap: 12px;
    z-index: 20;
    flex-shrink: 0;
  }
  #topbar-player {
    display: flex; align-items: center; gap: 8px; flex: 1;
  }
  #topbar-emoji { font-size: 1.6rem; line-height: 1; }
  #topbar-name { font-weight: 800; font-size: 0.95rem; color: var(--accent3); }
  #topbar-kind { color: var(--text3); font-size: 0.78rem; }
  #topbar-rating {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 12px;
    font-size: 0.85rem; font-weight: 700;
  }
  #topbar-save-btn {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1.1rem; transition: border-color 0.15s;
  }
  #topbar-save-btn:hover { border-color: var(--accent2); }

  /* RELATION BAR */
  #relation-bar {
    padding: 10px 16px 8px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: none;
    flex-shrink: 0;
  }
  #relation-bar.visible { display: block; }
  .rel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .rel-name { font-weight: 700; font-size: 0.9rem; color: var(--accent3); }
  .rel-pct { font-size: 0.85rem; font-weight: 700; color: var(--text2); }
  .rel-track { height: 8px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
  .rel-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width 0.5s ease; }
  .rel-status { font-size: 0.75rem; color: var(--text3); margin-top: 4px; }

  /* FEED */
  #feed-wrap {
    flex: 1; overflow-y: auto; padding: 16px 12px;
    display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
  }

  /* POST CARD */
  .post {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 18px;
    animation: fadeUp 0.35s ease both;
    max-width: 600px; width: 100%;
    align-self: flex-start;
  }
  .post.post-player { align-self: flex-end; background: #1e1050; border-color: #5b3fa0; }
  .post.post-narrator { background: transparent; border-color: transparent; padding: 4px 4px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .post-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .post-avatar { font-size: 1.6rem; line-height: 1; }
  .post-speaker { font-weight: 800; font-size: 0.95rem; }
  .post-gender { color: var(--text3); font-size: 0.8rem; }
  .post-body { display: flex; flex-direction: column; gap: 8px; }
  .post-action { color: var(--text2); font-size: 0.93rem; font-style: normal; }
  .post-action strong { color: var(--text); font-weight: 600; }
  .post-dialog { color: var(--accent3); font-size: 0.97rem; font-style: italic; }
  .post-dialog::before { content: '"'; }
  .post-dialog::after  { content: '"'; }
  .post-note { color: var(--text3); font-size: 0.82rem; font-style: italic; }

  .location-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 12px;
    font-size: 0.78rem; color: var(--text3);
    align-self: center; margin: 4px 0;
    letter-spacing: 0.05em;
  }

  /* CHOICES */
  #choices-wrap {
    padding: 12px 12px;
    display: flex; flex-direction: column; gap: 8px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #choices-wrap.hidden { display: none; }

  .choice-btn {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 16px;
    color: var(--text); font-family: 'Nunito', sans-serif; font-size: 0.92rem;
    cursor: pointer; text-align: left; transition: all 0.15s;
    font-weight: 600; line-height: 1.4;
  }
  .choice-btn:hover { border-color: var(--accent); background: #251548; color: var(--accent3); }
  .choice-btn:active { transform: scale(0.98); }
  .choice-btn.next-btn {
    text-align: center; color: var(--text3); font-weight: 700; font-size: 0.85rem;
    border-style: dashed;
  }

  /* HUB */
  #hub {
    height: var(--hub-h);
    min-height: var(--hub-h);
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: none;
    align-items: center;
    overflow-x: auto;
    padding: 0 12px;
    gap: 8px;
    flex-shrink: 0;
    z-index: 10;
    scrollbar-width: none;
  }
  #hub::-webkit-scrollbar { display: none; }
  #hub.visible { display: flex; }

  .hub-btn {
    display: flex; flex-direction: column; align-items: center;
    gap: 3px; min-width: 60px; padding: 6px 8px; border-radius: 14px;
    border: 1px solid transparent; background: transparent;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }
  .hub-btn:hover { background: var(--bg3); border-color: var(--border); }
  .hub-btn.active-loc { background: #2a1060; border-color: var(--accent); }
  .hub-icon { font-size: 1.5rem; line-height: 1; }
  .hub-label { font-size: 0.62rem; font-weight: 700; color: var(--text3); text-align: center; white-space: nowrap; letter-spacing: 0.03em; }

  /* ─────────────────── SAVE MODAL ─────────────────── */
  #save-modal {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: #000000bb; align-items: center; justify-content: center;
  }
  #save-modal.open { display: flex; }
  .modal-box {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 20px; padding: 28px; width: 340px; max-width: 95vw;
  }
  .modal-title { font-size: 1.1rem; font-weight: 800; color: var(--accent3); margin-bottom: 16px; }
  .save-slots { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
  .save-slot {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; cursor: pointer; transition: border-color 0.15s;
    display: flex; justify-content: space-between; align-items: center;
  }
  .save-slot:hover { border-color: var(--accent2); }
  .save-slot-info { font-size: 0.88rem; color: var(--text2); }
  .save-slot-time { font-size: 0.75rem; color: var(--text3); }
  .modal-close { width: 100%; }

  /* ─────────────────── MISC ─────────────────── */
  .rating-good   { color: var(--good); }
  .rating-neutral{ color: var(--neutral); }
  .rating-evil   { color: var(--evil); }

  .fade-in { animation: fadeUp 0.4s ease both; }

  /* mobile safe-area bottom padding for choices */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    #choices-wrap { padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
    #hub           { padding-bottom: calc(6px  + env(safe-area-inset-bottom)); height: calc(var(--hub-h) + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>

<!-- ═══════════════════ TITLE ═══════════════════ -->
<div id="screen-title" class="screen active">
  <span class="title-emoji">🎪</span>
  <h1 class="title-glow">Playcare</h1>
  <p class="title-sub">Живые Игрушки</p>
  <div class="title-rule"></div>
  <button class="btn btn-primary" onclick="showCreate()">▶ Начать игру</button>
  <button class="btn btn-secondary" style="margin-top:8px" onclick="openSaveModal('load')">📂 Загрузить сохранение</button>
</div>

<!-- ═══════════════════ CHARACTER CREATION ═══════════════════ -->
<div id="screen-create" class="screen">
  <h2 class="create-title">Создай свою игрушку</h2>
  <p class="create-subtitle">Ты — живая игрушка. Чёрные белки, молния-застёжка, своя история.</p>

  <div class="create-card">
    <!-- preview -->
    <div class="preview-toy">
      <span class="preview-emoji" id="preview-emoji">🐾</span>
      <div class="preview-name" id="preview-name">Имя не задано</div>
      <div class="preview-meta" id="preview-meta">Вид не задан · —</div>
    </div>

    <!-- emoji -->
    <div class="form-group">
      <label class="form-label">Иконка</label>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>

    <!-- name -->
    <div class="form-group">
      <label class="form-label">Имя</label>
      <input class="form-input" id="char-name" type="text" maxlength="20" placeholder="Как тебя зовут?" oninput="updatePreview()">
    </div>

    <!-- species -->
    <div class="form-group">
      <label class="form-label">Вид</label>
      <input class="form-input" id="char-kind" type="text" maxlength="30" placeholder="Кошка, пёс, лиса…" oninput="updatePreview()">
    </div>

    <!-- appearance (optional) -->
    <div class="form-group">
      <label class="form-label">Внешность <span style="font-weight:400;opacity:.6">(необязательно)</span></label>
      <input class="form-input" id="char-look" type="text" maxlength="60" placeholder="Рыжий, пятнышко на ухе…">
    </div>

    <!-- gender -->
    <div class="form-group">
      <label class="form-label">Пол</label>
      <div class="gender-row">
        <button class="gender-btn" data-g="♂" onclick="selectGender(this)">♂ Он</button>
        <button class="gender-btn" data-g="♀" onclick="selectGender(this)">♀ Она</button>
        <button class="gender-btn" data-g="◈" onclick="selectGender(this)">◈ Своё</button>
      </div>
    </div>

    <button class="btn btn-primary" onclick="startGame()" style="width:100%">Войти в Playcare →</button>
    <button class="btn btn-secondary btn-sm" onclick="goTo('title')" style="align-self:center">← Назад</button>
  </div>
</div>

<!-- ═══════════════════ GAME ═══════════════════ -->
<div id="screen-game" class="screen" style="flex-direction:column;">

  <!-- TOPBAR -->
  <div id="topbar">
    <div id="topbar-player">
      <span id="topbar-emoji">🐾</span>
      <div>
        <div id="topbar-name">—</div>
        <div id="topbar-kind">—</div>
      </div>
    </div>
    <div id="topbar-rating"><span id="rating-icon">😐</span><span id="rating-label">Нейтральный</span></div>
    <div id="topbar-save-btn" onclick="openSaveModal('save')" title="Сохранить">💾</div>
  </div>

  <!-- RELATION BAR -->
  <div id="relation-bar">
    <div class="rel-header">
      <span class="rel-name" id="rel-name">—</span>
      <span class="rel-pct" id="rel-pct">0%</span>
    </div>
    <div class="rel-track"><div class="rel-fill" id="rel-fill" style="width:0%"></div></div>
    <div class="rel-status" id="rel-status">Незнакомцы</div>
  </div>

  <!-- FEED -->
  <div id="feed-wrap"></div>

  <!-- CHOICES -->
  <div id="choices-wrap" class="hidden"></div>

  <!-- HUB -->
  <div id="hub"></div>
</div>

<!-- ═══════════════════ SAVE MODAL ═══════════════════ -->
<div id="save-modal">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">Сохранить игру</div>
    <div class="save-slots" id="save-slots"></div>
    <button class="btn btn-secondary modal-close" onclick="closeSaveModal()">Закрыть</button>
  </div>
</div>

<script>
'use strict';

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
var G = {
  player: { emoji:'🐾', name:'', kind:'', look:'', gender:'♂' },
  rating: 0,           // -100..100; <-20=evil, >20=good
  relations: {         // npc_id -> 0-100
    mamochka: 0,
    day: 0,
    harley: 0,
    yarnabu: 0,
    rabi: 0,
    daddy: 0
  },
  prologDone: false,
  scene: null,         // current scene id
  hubActive: false,
  saveMode: null
};

// ─────────────────────────────────────────────
//  NPC DATA
// ─────────────────────────────────────────────
var NPC = {
  mamochka: { emoji:'🌸', name:'Мамочка', gender:'♀', color:'#f9a8d4' },
  day:      { emoji:'🐶', name:'Дэй',     gender:'♂', color:'#fdba74' },
  harley:   { emoji:'📺', name:'Доктор Харли', gender:'—', color:'#94a3b8' },
  yarnabu:  { emoji:'🦁', name:'Ярнаби',  gender:'♂', color:'#fde68a' },
  rabi:     { emoji:'🦇', name:'Раби',    gender:'♀', color:'#c4b5fd' },
  daddy:    { emoji:'🎩', name:'Папочка Лонг Ленг', gender:'♂', color:'#93c5fd' }
};

// ─────────────────────────────────────────────
//  EMOJI PICKER OPTIONS
// ─────────────────────────────────────────────
var EMOJIS = ['🐶','🐱','🦊','🐸','🐺','🐻','🐼','🐨','🦁','🐯',
              '🐰','🐷','🐮','🐧','🐦','🐸','🦄','🐉','🦅','🐑',
              '🦈','🐘','🐊','🐀','🦇','🐥'];

// ─────────────────────────────────────────────
//  HUB LOCATIONS
// ─────────────────────────────────────────────
var LOCS = [
  { id:'home',    icon:'🏠', label:'Дом Милый Дом' },
  { id:'school',  icon:'🏫', label:'Школа' },
  { id:'gamehouse',icon:'🎮',label:'Игровой Дом' },
  { id:'shop',    icon:'🏪', label:'Магазин' },
  { id:'park',    icon:'🌳', label:'Парк' },
  { id:'library', icon:'📚', label:'Библиотека' },
  { id:'office',  icon:'🏢', label:'Офис' },
  { id:'door',    icon:'🚪', label:'Выход' },
  { id:'myroom',  icon:'🛏️', label:'Моя комната' }
];

// ─────────────────────────────────────────────
//  SCENE DATA  (Prologue scenes 1-8)
// ─────────────────────────────────────────────
// Each scene: { id, npcId(optional), posts[], choices[] }
// post: { type:'npc'|'player'|'loc'|'narrator', npcId, lines: [{t:'action'|'dialog'|'note', text}] }
// choice: { text, next(sceneId or fn), rep, relId, relDelta }

function buildScenes() {
  return {

    // ── SCENE 1 ──────────────────────────────────────────────
    s1: {
      id:'s1', npcId:'mamochka',
      posts:[
        { type:'loc',  text:'📍 Коридор · Рядом с мусоропроводом' },
        { type:'npc', npcId:'mamochka', lines:[
          { t:'action', text:'Огромные розовые руки подхватывают тебя прямо у земли. Лицо, которое смотрит на тебя сверху — широкая улыбка, фиолетовые волосы, тёплые глаза.' },
          { t:'dialog', text:'Ой-ой-ой... Бедняжка. Ты живой?' },
          { t:'action', text:'Прижимает тебя к себе — бережно, как хрупкую вещь.' }
        ]}
      ],
      choices:[{ text:'Продолжить →', next:'s2', rep:0 }]

// ─────────────────────────────────────────────
//  UTIL
// ─────────────────────────────────────────────
function qs(sel) { return document.querySelector(sel); }

function relStatus(v) {
  if (v < 10) return 'Незнакомцы';
  if (v < 30) return 'Знакомые';
  if (v < 55) return 'Приятели';
  if (v < 80) return 'Друзья';
  return '💕 Романтика';
}

function ratingInfo() {
  var r = G.rating;
  if (r >= 20) return { icon:'😇', label:'Хороший',    cls:'rating-good' };
  if (r <= -20) return { icon:'😈', label:'Плохой',     cls:'rating-evil' };
  return             { icon:'😐', label:'Нейтральный', cls:'rating-neutral' };
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ─────────────────────────────────────────────
//  SCREENS
// ─────────────────────────────────────────────
function goTo(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  var el = qs('#screen-' + id);
  if (el) el.classList.add('active');
}

function showCreate() {
  buildEmojiGrid();
  goTo('create');
}

// ─────────────────────────────────────────────
function buildEmojiGrid() {
  var grid = qs('#emoji-grid');
  grid.innerHTML = '';
  EMOJIS.forEach(function(em) {
    var btn = document.createElement('button');
    btn.className = 'emoji-btn';
    btn.textContent = em;
    btn.onclick = function() { selectEmoji(this, em); };
    grid.appendChild(btn);
  });
  // pre-select first
  var first = grid.querySelector('.emoji-btn');
  if (first) { first.classList.add('selected'); G.player.emoji = EMOJIS[0]; }
}

function selectEmoji(btn, em) {
  document.querySelectorAll('.emoji-btn').forEach(function(b){ b.classList.remove('selected'); });
  btn.classList.add('selected');
  G.player.emoji = em;
  updatePreview();
}

function selectGender(btn) {
  document.querySelectorAll('.gender-btn').forEach(function(b){ b.classList.remove('selected'); });
  btn.classList.add('selected');
  G.player.gender = btn.dataset.g;
  updatePreview();
}

function updatePreview() {
  G.player.name = qs('#char-name').value.trim() || 'Имя не задано';
  G.player.kind = qs('#char-kind').value.trim() || 'Вид не задан';
  qs('#preview-emoji').textContent = G.player.emoji;
  qs('#preview-name').textContent = G.player.name;
  qs('#preview-meta').textContent = G.player.kind + ' · ' + G.player.gender;
}

function startGame() {
  var name = qs('#char-name').value.trim();
  var kind = qs('#char-kind').value.trim();
  if (!name) { qs('#char-name').focus(); qs('#char-name').style.borderColor='#f87171'; return; }
  if (!kind)  { qs('#char-kind').focus();  qs('#char-kind').style.borderColor='#f87171'; return; }
  G.player.name = name;
  G.player.kind = kind;
  G.player.look = qs('#char-look').value.trim();
  // gender from selection
  var gsel = document.querySelector('.gender-btn.selected');
  G.player.gender = gsel ? gsel.dataset.g : '♂';

  buildHub();
  updateTopbar();
  goTo('game');
  runScene('s1');
}

// ─────────────────────────────────────────────
//  TOPBAR + RELATION
// ─────────────────────────────────────────────
function updateTopbar() {
  qs('#topbar-emoji').textContent = G.player.emoji;
  qs('#topbar-name').textContent  = G.player.name;
  qs('#topbar-kind').textContent  = G.player.kind + ' ' + G.player.gender;
  var ri = ratingInfo();
  qs('#rating-icon').textContent  = ri.icon;
  qs('#rating-label').textContent = ri.label;
  qs('#topbar-rating').className  = ri.cls;
}

function showRelBar(npcId) {
  if (!npcId || !NPC[npcId]) { hideRelBar(); return; }
  var val = G.relations[npcId] || 0;
  var npc = NPC[npcId];
  qs('#rel-name').textContent   = npc.emoji + ' ' + npc.name + ' — Отношения';
  qs('#rel-pct').textContent    = val + '%';
  qs('#rel-fill').style.width   = val + '%';
  qs('#rel-status').textContent = relStatus(val);
  qs('#relation-bar').classList.add('visible');
}

function hideRelBar() {
  qs('#relation-bar').classList.remove('visible');
}

// ─────────────────────────────────────────────
//  HUB
// ─────────────────────────────────────────────
function buildHub() {
  var hub = qs('#hub');
  hub.innerHTML = '';
  LOCS.forEach(function(loc) {
    var btn = document.createElement('button');
    btn.className = 'hub-btn';
    btn.id = 'hub-' + loc.id;
    btn.innerHTML = '<span class="hub-icon">' + loc.icon + '</span><span class="hub-label">' + loc.label + '</span>';
    btn.onclick = function() { hubGo(loc.id); };
    hub.appendChild(btn);
  });
}

function showHub() {
  G.hubActive = true;
  qs('#hub').classList.add('visible');
  qs('#choices-wrap').classList.add('hidden');
  hideRelBar();
}

function hideHub() {
  G.hubActive = false;
  qs('#hub').classList.remove('visible');
}

function hubGo(locId) {
  var sceneId = 'hub_' + locId;
  if (SCENES[sceneId]) {
    hideHub();
    runScene(sceneId);
  } else {
    // placeholder
    hideHub();
    addLocTag('📍 ' + LOCS.find(function(l){ return l.id===locId; }).label);
    addNarratorPost([{ t:'note', text:'Здесь пока ничего не происходит.' }]);
    showChoices([{ text:'← Назад в хаб', next:'hub', rep:0 }]);
  }
}

// ─────────────────────────────────────────────
//  FEED RENDERING
// ─────────────────────────────────────────────
function clearFeed() {
  qs('#feed-wrap').innerHTML = '';
}

function scrollFeed() {
  var fw = qs('#feed-wrap');
  fw.scrollTop = fw.scrollHeight;
}

function addLocTag(text) {
  var el = document.createElement('div');
  el.className = 'location-tag fade-in';
  el.textContent = text;
  qs('#feed-wrap').appendChild(el);
  scrollFeed();
}

function addPost(post, delay) {
  delay = delay || 0;
  setTimeout(function() {
    var div = document.createElement('div');
    var cls = 'post';
    if (post.type === 'player')   cls += ' post-player';
    if (post.type === 'narrator') cls += ' post-narrator';
    div.className = cls;

    // header for npc/player
    if (post.type === 'npc' && post.npcId) {
      var npc = NPC[post.npcId];
      if (npc) {
        var hdr = document.createElement('div');
        hdr.className = 'post-header';
        hdr.innerHTML = '<span class="post-avatar">' + npc.emoji + '</span>'
          + '<span class="post-speaker" style="color:' + npc.color + '">' + npc.name + '</span>'
          + '<span class="post-gender">' + npc.gender + '</span>';
        div.appendChild(hdr);
      }
    } else if (post.type === 'player') {
      var hdr2 = document.createElement('div');
      hdr2.className = 'post-header';
      hdr2.innerHTML = '<span class="post-avatar">' + G.player.emoji + '</span>'
        + '<span class="post-speaker" style="color:var(--accent3)">' + G.player.name + '</span>'
        + '<span class="post-gender">' + G.player.gender + '</span>';
      div.appendChild(hdr2);
    }

    // body lines
    var body = document.createElement('div');
    body.className = 'post-body';
    (post.lines || []).forEach(function(line) {
      var p = document.createElement('p');
      if (line.t === 'action') {
        p.className = 'post-action';
        p.innerHTML = '<strong>' + escHtml(line.text) + '</strong>';
      } else if (line.t === 'dialog') {
        p.className = 'post-dialog';
        p.textContent = line.text;
      } else {
        p.className = 'post-note';
        p.textContent = line.text;
      }
      body.appendChild(p);
    });
    div.appendChild(body);
    qs('#feed-wrap').appendChild(div);
    scrollFeed();
  }, delay);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addNarratorPost(lines) {
  addPost({ type:'narrator', lines: lines });
}

// ─────────────────────────────────────────────
//  CHOICES
// ─────────────────────────────────────────────
function showChoices(choices) {
  var wrap = qs('#choices-wrap');
  wrap.innerHTML = '';
  wrap.classList.remove('hidden');
  choices.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'choice-btn';
    if (c.next === 'hub' || c.text.indexOf('→') >= 0 || c.text.indexOf('←') >= 0) {
      btn.classList.add('next-btn');
    }
    btn.textContent = c.text;
    btn.onclick = function() { handleChoice(c); };
    wrap.appendChild(btn);
  });
}

function hideChoices() {
  var wrap = qs('#choices-wrap');
  wrap.classList.add('hidden');
  wrap.innerHTML = '';
}

function handleChoice(c) {
  hideChoices();

  // reputation
  if (c.rep) {
    G.rating = clamp(G.rating + c.rep, -100, 100);
    updateTopbar();
  }
  // relation
  if (c.relId && c.relDelta) {
    G.relations[c.relId] = clamp((G.relations[c.relId] || 0) + c.relDelta, 0, 100);
  }

  if (typeof c.next === 'function') {
    c.next();
  } else if (c.next === 'hub') {
    finishToHub();
  } else if (SCENES[c.next]) {
    runScene(c.next);
  } else {
    finishToHub();
  }
}

// ─────────────────────────────────────────────
//  SCENE RUNNER
// ─────────────────────────────────────────────
function runScene(sceneId) {
  if (sceneId === 'hub') { finishToHub(); return; }
  var scene = SCENES[sceneId];
  if (!scene) { finishToHub(); return; }

  G.scene = sceneId;
  hideHub();

  // if scene has an npc, show relation bar
  if (scene.npcId) {
    showRelBar(scene.npcId);
  } else {
    hideRelBar();
  }

  // render posts with small delays for feel
  var delay = 0;
  (scene.posts || []).forEach(function(post) {
    if (post.type === 'loc') {
      setTimeout(function(){ addLocTag(post.text); }, delay);
      delay += 200;
    } else {
      addPost(post, delay);
      delay += 350;
    }
  });

  // show choices after posts
  setTimeout(function() {
    if (scene.choices && scene.choices.length) {
      showChoices(scene.choices);
    }
  }, delay + 100);
}

function finishToHub() {
  G.prologDone = true;
  hideChoices();
  hideRelBar();
  showHub();
}

// ─────────────────────────────────────────────
//  SAVE / LOAD
// ─────────────────────────────────────────────
function openSaveModal(mode) {
  G.saveMode = mode;
  var modal = qs('#save-modal');
  qs('#modal-title').textContent = mode === 'save' ? '💾 Сохранить игру' : '📂 Загрузить игру';
  renderSaveSlots(mode);
  modal.classList.add('open');
}

function closeSaveModal() {
  qs('#save-modal').classList.remove('open');
}

function renderSaveSlots(mode) {
  var wrap = qs('#save-slots');
  wrap.innerHTML = '';
  for (var i = 1; i <= 3; i++) {
    var key = 'playcare_save_' + i;
    var raw = null;
    try { raw = localStorage.getItem(key); } catch(e){}
    var slot = null;
    if (raw) { try { slot = JSON.parse(raw); } catch(e){} }

    var div = document.createElement('div');
    div.className = 'save-slot';
    var slotNum = i;
    if (slot) {
      div.innerHTML = '<div class="save-slot-info">Слот ' + i + ' · ' + slot.player.emoji + ' ' + slot.player.name + '</div>'
        + '<div class="save-slot-time">' + (slot.ts || '—') + '</div>';
      if (mode === 'load') {
        div.onclick = function(n){ return function(){ loadGame(n); closeSaveModal(); }; }(slotNum);
      } else {
        div.onclick = function(n){ return function(){ saveGame(n); closeSaveModal(); }; }(slotNum);
      }
    } else {
      div.innerHTML = '<div class="save-slot-info">Слот ' + i + ' — пусто</div><div class="save-slot-time">—</div>';
      if (mode === 'save') {
        div.onclick = function(n){ return function(){ saveGame(n); closeSaveModal(); }; }(slotNum);
      } else {
        div.style.opacity = '0.4'; div.style.cursor = 'default';
      }
    }
    wrap.appendChild(div);
  }
}

function saveGame(slot) {
  var data = {
    player: G.player,
    rating: G.rating,
    relations: G.relations,
    prologDone: G.prologDone,
    scene: G.scene,
    ts: new Date().toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' })
  };
  try { localStorage.setItem('playcare_save_' + slot, JSON.stringify(data)); } catch(e){}
}

function loadGame(slot) {
  var raw = null;
  try { raw = localStorage.getItem('playcare_save_' + slot); } catch(e){}
  if (!raw) return;
  var data = null;
  try { data = JSON.parse(raw); } catch(e){ return; }
  G.player    = data.player    || G.player;
  G.rating    = data.rating    || 0;
  G.relations = data.relations || G.relations;
  G.prologDone = data.prologDone || false;

  buildHub();
  updateTopbar();
  clearFeed();
  goTo('game');

  if (G.prologDone) {
    addNarratorPost([{ t:'note', text:'Игра загружена. Playcare ждёт тебя.' }]);
    showHub();
  } else {
    runScene(data.scene || 's1');
  }
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
(function init() {
  // pre-select first gender
  var firstG = document.querySelector('.gender-btn');
  if (firstG) { firstG.classList.add('selected'); }
})();
</script>
