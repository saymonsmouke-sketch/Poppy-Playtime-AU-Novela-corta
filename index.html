<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PLAYCARE — Живые Игрушки</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0a12;
    --bg2: #13101a;
    --bg3: #1a1525;
    --border: #2a2040;
    --accent: #c084fc;
    --accent2: #f472b6;
    --accent3: #fb923c;
    --text: #e8e0f0;
    --text-dim: #8b7fa8;
    --glow: rgba(192, 132, 252, 0.15);
    --gold: #fbbf24;
    --green: #4ade80;
    --red: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: fixed;
    width: 100%;
    top: 0; left: 0;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(192,132,252,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(244,114,182,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(251,146,60,0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 15%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 45%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 80%, rgba(255,255,255,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 8px 16px 6px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(13,10,18,0.95) 0%, rgba(19,16,26,0.9) 100%);
    backdrop-filter: blur(10px);
    flex-shrink: 0;
    overflow: hidden;
  }

  .header-top {
    display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px;
  }

  .lamp {
    width: 22px; height: 22px; border-radius: 50%;
    background: radial-gradient(circle, #fef08a 0%, #fb923c 50%, #dc2626 100%);
    box-shadow: 0 0 20px 8px rgba(251,146,60,0.4), 0 0 40px 15px rgba(254,240,138,0.15);
    flex-shrink: 0;
    animation: pulse-lamp 3s ease-in-out infinite;
  }

  @keyframes pulse-lamp {
    0%,100% { box-shadow: 0 0 20px 8px rgba(251,146,60,0.4), 0 0 40px 15px rgba(254,240,138,0.15); }
    50% { box-shadow: 0 0 28px 12px rgba(251,146,60,0.55), 0 0 55px 20px rgba(254,240,138,0.2); }
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-size: 1rem; font-weight: 600; letter-spacing: 0.2em;
    color: var(--accent); text-shadow: 0 0 20px rgba(192,132,252,0.5);
  }

  header p.sub { font-size: 0.62rem; color: var(--text-dim); letter-spacing: 0.15em; font-style: italic; }

  #status-bar {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-top: 4px; flex-wrap: wrap;
  }

  .stat-pill {
    display: flex; align-items: center; gap: 4px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 20px; padding: 2px 8px;
    font-size: 0.68rem; font-family: 'Cinzel', serif;
    cursor: default; transition: border-color 0.2s; white-space: nowrap;
  }
  .stat-pill.tokens { border-color: rgba(251,191,36,0.3); }
  .stat-pill.level { border-color: rgba(192,132,252,0.3); }
  .stat-pill.char { border-color: rgba(244,114,182,0.3); }
  .stat-pill .val { font-weight: 600; }
  .stat-pill.tokens .val { color: var(--gold); }
  .stat-pill.level .val { color: var(--accent); }
  .stat-pill.char .val { color: var(--accent2); font-size: 0.68rem; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .stat-pill .icon { font-size: 0.8rem; }

  .header-btns {
    display: flex; gap: 4px; justify-content: center; margin-top: 5px; flex-wrap: wrap;
  }

  .hdr-btn {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 2px 8px;
    color: var(--text-dim); font-family: 'Cinzel', serif;
    font-size: 0.58rem; letter-spacing: 0.05em;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
  .hdr-btn.memory-btn { border-color: rgba(251,146,60,0.3); color: var(--accent3); }
  .hdr-btn.memory-btn:hover { border-color: var(--accent3); }

  /* ── API SCREEN ── */
  #api-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: rgba(13,10,18,0.97); backdrop-filter: blur(20px); padding: 20px;
  }

  .api-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px 24px; max-width: 360px; width: 100%;
    text-align: center;
    box-shadow: 0 0 60px rgba(192,132,252,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .api-card .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .api-card h2 { font-family: 'Cinzel', serif; font-size: 1rem; color: var(--accent); margin-bottom: 8px; letter-spacing: 0.1em; }
  .api-card p { font-size: 0.85rem; color: var(--text-dim); line-height: 1.6; margin-bottom: 20px; }
  .api-card p a { color: var(--accent2); text-decoration: none; }

  input[type="password"], input[type="text"] {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: var(--text);
    font-family: 'Crimson Pro', serif; font-size: 0.95rem;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s; margin-bottom: 12px;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(192,132,252,0.15); }

  .btn-primary {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    border: none; border-radius: 10px; color: white;
    font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 0.1em;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    box-shadow: 0 4px 20px rgba(124,58,237,0.3);
  }
  .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
  .api-note { margin-top: 14px; font-size: 0.75rem; color: var(--text-dim); font-style: italic; }

  /* ── MAIN APP ── */
  #app {
    display: none; flex-direction: column; flex: 1; min-height: 0;
    position: relative; z-index: 1; overflow: hidden;
  }
  #app.visible { display: flex; }

  /* ── CHAT AREA ── */
  #chat {
    flex: 1; min-height: 0; overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── MESSAGES ── */
  .msg {
    max-width: 90%;
    animation: msg-in 0.3s ease-out;
    position: relative;
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-narrator { align-self: flex-start; }
  .msg-user { align-self: flex-end; }

  .msg-narrator .bubble {
    background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
    border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px;
    padding: 14px 16px;
    font-size: 0.95rem; line-height: 1.75; color: var(--text);
    box-shadow: 0 2px 12px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.03);
    position: relative;
  }
  .msg-narrator .bubble::before {
    content: '✦';
    position: absolute; top: -10px; left: 12px;
    font-size: 0.6rem; color: var(--accent); opacity: 0.7;
  }

  .msg-user .bubble {
    background: linear-gradient(135deg, #3b1d6e, #4c1d95);
    border: 1px solid rgba(192,132,252,0.3);
    border-radius: 16px 4px 16px 16px;
    padding: 12px 16px;
    font-size: 0.9rem; line-height: 1.6; color: #e9d5ff;
    box-shadow: 0 2px 12px rgba(124,58,237,0.2);
  }

  .msg-label {
    font-size: 0.65rem; letter-spacing: 0.12em; color: var(--text-dim);
    margin-bottom: 5px; padding: 0 4px; font-family: 'Cinzel', serif;
  }
  .msg-user .msg-label { text-align: right; }

  .msg-narrator .bubble strong.choice-btn:hover { color: var(--accent); }

  /* Msg controls (edit + rollback) */
  .msg-controls {
    display: flex; gap: 4px;
    margin-top: 5px;
    opacity: 0; transition: opacity 0.15s;
  }
  .msg:hover .msg-controls { opacity: 1; }
  .msg-user .msg-controls { justify-content: flex-end; }

  .msg-ctrl-btn {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 7px;
    color: var(--text-dim); font-size: 0.6rem;
    font-family: 'Cinzel', serif; cursor: pointer;
    transition: all 0.12s; white-space: nowrap;
  }
  .msg-ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .msg-ctrl-btn.rollback:hover { border-color: var(--accent3); color: var(--accent3); }
  .msg-ctrl-btn.rollback { border-color: rgba(251,146,60,0.25); color: rgba(251,146,60,0.6); }

  /* Edit mode */
  .bubble-edit-area {
    width: 100%; background: var(--bg3);
    border: 1px solid var(--accent);
    border-radius: 8px; padding: 8px 10px;
    color: var(--text); font-family: 'Crimson Pro', serif;
    font-size: 0.92rem; line-height: 1.6;
    outline: none; resize: none;
    min-height: 60px; margin-bottom: 6px;
  }
  .edit-save-btn {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    border: none; border-radius: 7px; padding: 4px 14px;
    color: white; font-family: 'Cinzel', serif; font-size: 0.65rem;
    cursor: pointer; margin-right: 6px;
  }
  .edit-cancel-btn {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 7px; padding: 4px 10px;
    color: var(--text-dim); font-family: 'Cinzel', serif; font-size: 0.65rem;
    cursor: pointer;
  }

  /* system event message */
  .msg-system { align-self: center; max-width: 90%; }
  .msg-system .bubble {
    background: rgba(192,132,252,0.07); border: 1px solid rgba(192,132,252,0.2);
    border-radius: 10px; padding: 8px 14px;
    font-size: 0.78rem; color: var(--text-dim); text-align: center; font-style: italic;
  }

  /* MEMORY EVENT flash */
  .msg-memory-flash { align-self: center; max-width: 90%; }
  .msg-memory-flash .bubble {
    background: rgba(251,146,60,0.08); border: 1px solid rgba(251,146,60,0.25);
    border-radius: 10px; padding: 6px 14px;
    font-size: 0.75rem; color: var(--accent3); text-align: center; font-style: italic;
  }

  /* TYPING */
  .msg-typing .bubble { padding: 16px 20px; }
  .dots { display: flex; gap: 5px; align-items: center; }
  .dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); animation: dot-bounce 1.2s ease-in-out infinite; opacity: 0.7;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .dots span:nth-child(3) { animation-delay: 0.4s; background: var(--accent3); }
  @keyframes dot-bounce {
    0%,80%,100% { transform: translateY(0); opacity: 0.7; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* Error */
  .msg-error .bubble {
    background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3);
    color: #fca5a5; font-size: 0.85rem;
  }

  /* ── INPUT AREA ── */
  #input-area {
    flex-shrink: 0; padding: 10px 14px 14px;
    background: linear-gradient(0deg, rgba(13,10,18,0.98) 0%, rgba(13,10,18,0.8) 100%);
    backdrop-filter: blur(15px); border-top: 1px solid var(--border);
  }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  #user-input {
    flex: 1; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 14px; color: var(--text);
    font-family: 'Crimson Pro', serif; font-size: 1rem;
    outline: none; resize: none; max-height: 100px; min-height: 44px;
    transition: border-color 0.2s, box-shadow 0.2s; line-height: 1.4;
  }
  #user-input:focus { border-color: rgba(192,132,252,0.5); box-shadow: 0 0 0 3px rgba(192,132,252,0.08); }
  #user-input::placeholder { color: var(--text-dim); font-style: italic; }

  #send-btn {
    width: 44px; height: 44px; flex-shrink: 0;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    border: none; border-radius: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s, transform 0.1s;
    box-shadow: 0 3px 12px rgba(124,58,237,0.35);
  }
  #send-btn:active { transform: scale(0.93); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #send-btn svg { width: 18px; height: 18px; fill: white; }
  .input-hint { text-align: center; font-size: 0.62rem; color: var(--text-dim); margin-top: 6px; font-style: italic; opacity: 0.7; }

  /* COMMANDS BAR */
  .cmd-bar { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 8px; scrollbar-width: none; }
  .cmd-bar::-webkit-scrollbar { display: none; }
  .cmd-btn {
    flex-shrink: 0; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 11px; color: var(--text-dim);
    font-family: 'Crimson Pro', serif; font-size: 0.73rem;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .cmd-btn:active, .cmd-btn:hover { background: var(--bg2); border-color: var(--accent); color: var(--accent); }
  .cmd-btn.special { border-color: rgba(251,191,36,0.3); color: var(--gold); }

  /* ── OVERLAY PANEL ── */
  .panel-overlay {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(13,10,18,0.85); backdrop-filter: blur(12px);
    display: flex; align-items: flex-end; justify-content: center;
    animation: panel-fade 0.2s ease-out;
  }
  @keyframes panel-fade { from { opacity: 0; } to { opacity: 1; } }

  .panel-sheet {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 20px 20px 0 0; width: 100%; max-width: 500px;
    max-height: 80vh; overflow-y: auto;
    padding: 20px 18px 30px;
    animation: panel-up 0.25s ease-out;
    box-shadow: 0 -10px 60px rgba(0,0,0,0.5);
  }
  @keyframes panel-up { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .panel-sheet::-webkit-scrollbar { width: 3px; }
  .panel-sheet::-webkit-scrollbar-thumb { background: var(--border); }

  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .panel-header h3 { font-family: 'Cinzel', serif; font-size: 0.9rem; letter-spacing: 0.1em; color: var(--accent); }
  .panel-close {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 10px; color: var(--text-dim);
    font-size: 0.75rem; cursor: pointer; font-family: 'Cinzel', serif;
  }

  /* SHOP */
  .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .shop-item {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px; cursor: pointer;
    transition: all 0.15s; text-align: center;
  }
  .shop-item:hover { border-color: var(--accent); }
  .shop-item.cant-afford { opacity: 0.45; cursor: not-allowed; }
  .shop-item .s-icon { font-size: 1.6rem; margin-bottom: 5px; }
  .shop-item .s-name { font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--text); margin-bottom: 3px; }
  .shop-item .s-desc { font-size: 0.72rem; color: var(--text-dim); line-height: 1.3; margin-bottom: 6px; font-style: italic; }
  .shop-item .s-price { font-size: 0.75rem; color: var(--gold); font-family: 'Cinzel', serif; }
  .shop-item .s-effect { font-size: 0.65rem; color: var(--green); margin-top: 2px; }

  /* INVENTORY */
  .inv-list { display: flex; flex-direction: column; gap: 8px; }
  .inv-item {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .inv-item .i-icon { font-size: 1.4rem; flex-shrink: 0; }
  .inv-item .i-info { flex: 1; }
  .inv-item .i-name { font-family: 'Cinzel', serif; font-size: 0.75rem; color: var(--text); }
  .inv-item .i-desc { font-size: 0.72rem; color: var(--text-dim); font-style: italic; }
  .inv-item .i-use {
    background: linear-gradient(135deg, #7c3aed, #a855f7); border: none;
    border-radius: 8px; padding: 5px 12px; color: white;
    font-family: 'Cinzel', serif; font-size: 0.65rem; cursor: pointer; flex-shrink: 0; transition: opacity 0.2s;
  }
  .inv-item .i-use:hover { opacity: 0.85; }
  .inv-empty { text-align: center; color: var(--text-dim); font-style: italic; font-size: 0.85rem; padding: 20px; }

  /* LEVEL */
  .lvl-panel { text-align: center; }
  .lvl-big { font-family: 'Cinzel', serif; font-size: 3rem; color: var(--accent); line-height: 1; margin: 10px 0; }
  .lvl-bar-wrap { background: var(--bg3); border-radius: 10px; height: 8px; overflow: hidden; margin: 10px 0; }
  .lvl-bar { height: 100%; background: linear-gradient(90deg, #7c3aed, #c084fc); border-radius: 10px; transition: width 0.5s; }
  .lvl-desc { font-size: 0.82rem; color: var(--text-dim); line-height: 1.5; margin-bottom: 14px; }
  .lvl-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
  .lvl-btn {
    background: var(--bg3); border: 1px solid rgba(192,132,252,0.3);
    border-radius: 10px; padding: 8px 16px; color: var(--accent);
    font-family: 'Cinzel', serif; font-size: 0.72rem; cursor: pointer; transition: all 0.15s;
  }
  .lvl-btn:hover { background: rgba(192,132,252,0.1); }
  .lvl-btn.gold { border-color: rgba(251,191,36,0.4); color: var(--gold); }
  .lvl-btn.gold:hover { background: rgba(251,191,36,0.08); }

  /* SAVES */
  .save-list { display: flex; flex-direction: column; gap: 8px; }
  .save-slot {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .save-slot .s-info { flex: 1; }
  .save-slot .s-name { font-family: 'Cinzel', serif; font-size: 0.75rem; color: var(--text); }
  .save-slot .s-meta { font-size: 0.68rem; color: var(--text-dim); font-style: italic; }
  .save-slot-btns { display: flex; gap: 6px; }
  .s-btn {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 7px; padding: 4px 10px; color: var(--text-dim);
    font-size: 0.68rem; font-family: 'Cinzel', serif; cursor: pointer; transition: all 0.15s;
  }
  .s-btn.load { border-color: rgba(74,222,128,0.3); color: var(--green); }
  .s-btn.del { border-color: rgba(248,113,113,0.3); color: var(--red); }
  .s-btn:hover { opacity: 0.8; }
  .save-new-btn {
    background: linear-gradient(135deg, #7c3aed, #a855f7); border: none;
    border-radius: 10px; padding: 11px; color: white;
    font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 0.08em;
    cursor: pointer; width: 100%; margin-top: 10px; transition: opacity 0.2s;
  }
  .save-new-btn:hover { opacity: 0.85; }

  /* ── MEMORY PANEL ── */
  .memory-tabs {
    display: flex; gap: 6px; overflow-x: auto;
    padding-bottom: 10px; margin-bottom: 14px;
    border-bottom: 1px solid var(--border); scrollbar-width: none;
  }
  .memory-tabs::-webkit-scrollbar { display: none; }
  .mem-tab {
    flex-shrink: 0; background: var(--bg3); border: 1px solid var(--border);

<body>

<script>
// ══════════════════════════════════════════
//  CORE STATE
// ══════════════════════════════════════════
let apiKey = '';
let isLoading = false;

// Full visible message list (objects with role, text, snapshot, DOM el ref, id)
let messages = [];   // { id, role:'user'|'assistant', content, snapshot }

// History for API — rebuilt from messages on each call (last N only)
const CTX_WINDOW = 12; // how many messages sent to API

let gameState = {
  char: null,
  tokens: 0,
  level: 5,
  inventory: [],
  relations: {},
  achievements: [],
  memory: {
    lore: [],
    npcFacts: {},
  },
  quests: [],
  activeQuestId: null,
};

// snapshot = deep clone of gameState saved at each message
function snapshotState() {
  return JSON.parse(JSON.stringify(gameState));
}

function nextMsgId() {
  return Date.now() + '_' + Math.random().toString(36).slice(2,7);
}

// ══════════════════════════════════════════
//  QUEST CATALOGUE
// ══════════════════════════════════════════
const QUEST_POOL = [
  // EASY — 1-2 PT, 0 LVL
  { id:'q_help_clean', diff:'easy', icon:'🧹', title:'Чистюля', desc:'Помоги убраться в общей комнате или коридоре.', pt:1, lvl:0, hint:'Убери мусор или подмети пол в любом месте Playcare.' },
  { id:'q_cheer_up', diff:'easy', icon:'💬', title:'Утешитель', desc:'Поддержи расстроенную игрушку добрыми словами.', pt:1, lvl:0, hint:'Найди кого-то грустного и подбодри их.' },
  { id:'q_find_item', diff:'easy', icon:'🔍', title:'Поиск', desc:'Найди потерявшийся предмет для одной из игрушек.', pt:1, lvl:0, hint:'Спроси у NPC, не потерял ли кто что-нибудь.' },
  { id:'q_morning_help', diff:'easy', icon:'☀️', title:'Ранняя пташка', desc:'Помоги с утренней подготовкой к завтраку.', pt:1, lvl:0, hint:'Встань рано и помоги накрыть на стол или позвать всех.' },
  { id:'q_deliver_msg', diff:'easy', icon:'📨', title:'Почтальон', desc:'Передай сообщение от одной игрушки другой.', pt:2, lvl:0, hint:'Попроси NPC — может у кого-то есть просьба передать весточку.' },
  { id:'q_park_walk', diff:'easy', icon:'🌳', title:'Прогулка', desc:'Сделай круг по парку и поздоровайся с тремя игрушками.', pt:1, lvl:0, hint:'Просто гуляй по парку и общайся.' },
  { id:'q_compliment', diff:'easy', icon:'💛', title:'Добрые слова', desc:'Сделай искренний комплимент двум разным NPC.', pt:1, lvl:0, hint:'Скажи что-то хорошее игрушкам — они запомнят.' },

  // MEDIUM — 2-3 PT, 0-1 LVL
  { id:'q_resolve_conflict', diff:'medium', icon:'🤝', title:'Миротворец', desc:'Урегулируй конфликт между Улыбающимися и Кошмарными.', pt:3, lvl:0, hint:'Найди ссорящихся и помири их без драки.' },
  { id:'q_win_game', diff:'medium', icon:'🏆', title:'Победитель', desc:'Выиграй соревнование или игру в Игровом Доме.', pt:2, lvl:1, hint:'Зайди в Игровой Дом и попробуй победить в любом испытании.' },
  { id:'q_night_patrol', diff:'medium', icon:'🌙', title:'Ночной дозор', desc:'Не нарушая правил, продержись до рассвета без сна.', pt:3, lvl:0, hint:'Будь осторожен — Наряд-Клоуны патрулируют ночью.' },
  { id:'q_secret_discover', diff:'medium', icon:'🔮', title:'Тайна Playcare', desc:'Узнай один скрытый секрет от Ярнаби или другого таинственного NPC.', pt:2, lvl:0, hint:'Поищи Ярнаби в неожиданных местах и осторожно расспроси его.' },
  { id:'q_craft_surprise', diff:'medium', icon:'🎨', title:'Сюрприз', desc:'Придумай и организуй небольшой сюрприз для кого-то из жителей.', pt:2, lvl:0, hint:'Проявь творчество — организуй что-то особенное.' },
  { id:'q_protect_weak', diff:'medium', icon:'🛡️', title:'Защитник', desc:'Защити младшую или слабую игрушку от нападок.', pt:3, lvl:1, hint:'Заступись за кого-то, кого обижают.' },

  // HARD — 4-5 PT, 1-2 LVL
  { id:'q_escape_attempt', diff:'hard', icon:'🚪', title:'Запретная дверь', desc:'Исследуй Выходную Дверь и выясни что-то новое — незаметно от Клоунов.', pt:5, lvl:1, hint:'Осторожно — Клоуны опасны. Действуй умно, не силой.' },
  { id:'q_daddy_meeting', diff:'hard', icon:'🏢', title:'Аудиенция', desc:'Добейся встречи с Папочкой Лонг Ленгом в Офисе Консультаций.', pt:5, lvl:2, hint:'Попасть к Папочке крайне сложно — нужен повод или приглашение.' },
  { id:'q_nightmare_peace', diff:'hard', icon:'🌟', title:'Невозможный мир', desc:'Установи временное перемирие между Кошмарными и Улыбающимися.', pt:4, lvl:1, hint:'Обе группы должны согласиться — это почти невозможно.' },
  { id:'q_generator_secret', diff:'hard', icon:'⚡', title:'Сердце Playcare', desc:'Проникни в подвал под статуей и посмотри на генератор вблизи.', pt:5, lvl:2, hint:'Вход в подвал скрыт — найди способ туда попасть.' },
  { id:'q_great_event', diff:'hard', icon:'🎭', title:'Грандиозное событие', desc:'Организуй общий праздник или спектакль с участием 5+ NPC.', pt:4, lvl:1, hint:'Договорись с несколькими игрушками и устрой что-то масштабное.' },
];

function pickRandomQuests(count = 5) {
  const pool = [...QUEST_POOL];
  const result = [];
  // Guarantee at least 2 easy, 2 medium, 1 hard
  const byDiff = { easy: pool.filter(q=>q.diff==='easy'), medium: pool.filter(q=>q.diff==='medium'), hard: pool.filter(q=>q.diff==='hard') };
  const pick = (arr) => { const i = Math.floor(Math.random()*arr.length); return arr.splice(i,1)[0]; };
  result.push(pick(byDiff.easy), pick(byDiff.easy));
  result.push(pick(byDiff.medium), pick(byDiff.medium));
  result.push(pick(byDiff.hard));
  // shuffle
  return result.sort(()=>Math.random()-0.5).map(q => ({ ...q, status: 'idle' }));
}

function initQuests() {
  if (!gameState.quests || gameState.quests.length === 0) {
    gameState.quests = pickRandomQuests();
  }
}

function refreshQuests() {
  const REFRESH_COST = 2;
  if (gameState.quests.some(q => q.status === 'active')) { toast('❌ Сначала заверши активный квест!'); return; }
  if (gameState.tokens < REFRESH_COST) { toast(`❌ Нужно ${REFRESH_COST} PT для обновления`); return; }
  addTokens(-REFRESH_COST);
  gameState.quests = pickRandomQuests();
  toast('📋 Список квестов обновлён!');
  openPanel('quests');
}

function startQuest(questId) {
  const q = gameState.quests.find(q => q.id === questId);
  if (!q || q.status !== 'idle') return;
  q.status = 'active';
  gameState.activeQuestId = questId;
  closePanel();
  addSystemMsg(`📋 Квест начат: «${q.title}»`);
  sendToGroq(`[СИСТЕМНОЕ УВЕДОМЛЕНИЕ — КВЕСТ НАЧАТ]
Игрок принял квест: "${q.title}"
Задача: ${q.desc}
Подсказка: ${q.hint}
ID квеста: ${q.id}

Веди сцену так, чтобы игрок мог выполнить это задание естественным образом в рамках нарратива. Когда ты (как рассказчик) убедишься что задание РЕАЛЬНО выполнено по ходу RP — добавь в конце ответа тег [QUEST_DONE:${q.id}]. НЕ ставь этот тег пока задание не выполнено. НЕ говори игроку про тег.`);
}

function completeQuest(questId) {
  // Called ONLY by parseAITags when bot emits [QUEST_DONE:id]
  const q = gameState.quests.find(q => q.id === questId);
  if (!q || q.status === 'completed') return;
  q.status = 'completed';
  if (gameState.activeQuestId === questId) gameState.activeQuestId = null;
  if (q.pt > 0) addTokens(q.pt);
  if (q.lvl > 0) addLevel(q.lvl);
  const rewardText = [q.pt > 0 ? `+${q.pt} PT` : '', q.lvl > 0 ? `+${q.lvl} LVL` : ''].filter(Boolean).join(', ');
  addSystemMsg(`✅ Квест выполнен: «${q.title}»! Награда: ${rewardText}`);
  toast(`✅ «${q.title}» — ${rewardText}`, 3500);
}

function toast(msg, duration = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function updateStatusBar() {
  document.getElementById('stat-char').textContent = gameState.char || '—';
  document.getElementById('stat-lvl').textContent = gameState.level;
  document.getElementById('stat-tokens').textContent = gameState.tokens;
}

function addTokens(n) { gameState.tokens = Math.max(0, gameState.tokens + n); updateStatusBar(); }
function addLevel(n) { gameState.level = Math.max(1, gameState.level + n); updateStatusBar(); }

// ══════════════════════════════════════════
//  AI TAG PARSING
// ══════════════════════════════════════════
function parseAITags(text) {
  text = text.replace(/\[(\+|-)PT:(\d+)\]/g, (_, sign, num) => {
    const n = parseInt(num);
    if (sign === '+') { addTokens(n); toast(`🪙 +${n} Play-Token!`); }
    else { addTokens(-n); toast(`🪙 -${n} Play-Token`); }
    return '';
  });
  text = text.replace(/\[(\+|-|)LVL(?::(\d+))?\]/g, (_, sign, num) => {
    const n = parseInt(num || '1');
    if (sign === '-') {
      const hasAmulet = gameState.inventory.find(i => i.id === 'amulet');
      if (hasAmulet) { gameState.inventory = gameState.inventory.filter(i => i !== hasAmulet); toast('🔮 Амулет защитил от потери уровня!'); }
      else { addLevel(-n); toast(`⚔️ -${n} LVL!`, 3000); }
    } else { addLevel(n); toast(`⚔️ +${n} LVL!`); }
    return '';
  });
  text = text.replace(/\[CHAR:([^\]]+)\]/g, (_, name) => {
    if (!gameState.char) { gameState.char = name.trim(); updateStatusBar(); }
    return '';
  });
  // Achievement tag
  text = text.replace(/\[ACHIEV:([^|]+)\|([^\]]+)\]/g, (_, icon_name, desc) => {
    const parts = icon_name.split(':');
    const icon = parts[0], name = parts[1] || '?';
    if (!gameState.achievements.find(a => a.name === name)) {
      gameState.achievements.push({ icon, name, desc });
      toast(`🏆 Достижение: ${name}!`, 3000);
    }
    return '';
  });
  // Quest completion tag — only bot can trigger this
  text = text.replace(/\[QUEST_DONE:([^\]]+)\]/g, (_, id) => {
    completeQuest(id.trim());
    return '';
  });
  return text.trim();
}

// ══════════════════════════════════════════
//  MESSAGE RENDERING
// ══════════════════════════════════════════
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function parseUserText(text) {
  const safe = escapeHtml(text);
  return safe
    .replace(/\*\*(.+?)\*\*/gs, '<strong class="rp-action">$1</strong>')
    .replace(/\*([^*\n]+?)\*/g, '<em class="rp-speech">$1</em>')
    .replace(/\n/g, '<br>');
}

function parseNarratorText(text) {
  const safe = escapeHtml(text);
  // Numbered choices **1. Текст** or **1) Текст** — clickable
  return safe
    .replace(/\*\*(\d+[\.\)]\s*.+?)\*\*/g, (_, c) => {
      const clean = c.replace(/&quot;/g,"'");
      return `<strong class="choice-btn" onclick="clickChoice(\`${clean}\`)">${c}</strong>`;
    })
    .replace(/\*\*(.+?)\*\*/gs, '<strong class="rp-bold">$1</strong>')
    .replace(/&quot;([^&\n]+?)&quot;/g, '<em class="npc-speech">"$1"</em>')
    .replace(/\n/g, '<br>');
}

function buildMsgDom(msgObj) {
  const role = msgObj.role; // 'user' | 'assistant'
  const isUser = role === 'user';
  const cssRole = isUser ? 'user' : 'narrator';

  const div = document.createElement('div');
  div.className = `msg msg-${cssRole}`;
  div.dataset.msgId = msgObj.id;

  // Label
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = isUser ? '▸ ВЫ' : '✦ РАССКАЗЧИК';
  div.appendChild(label);

  // Bubble
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = isUser ? parseUserText(msgObj.content) : parseNarratorText(msgObj.content);
  div.appendChild(bubble);

  // Controls row
  const ctrl = document.createElement('div');
  ctrl.className = 'msg-controls';

  // Edit button
  const editBtn = document.createElement('button');
  editBtn.className = 'msg-ctrl-btn';
  editBtn.textContent = '✏ Изменить';
  editBtn.onclick = () => enterEditMode(msgObj.id, div, bubble);
  ctrl.appendChild(editBtn);

  // Rollback button
  const rollBtn = document.createElement('button');
  rollBtn.className = 'msg-ctrl-btn rollback';
  rollBtn.textContent = '⏪ Откатить сюда';
  rollBtn.onclick = () => rollbackTo(msgObj.id);
  ctrl.appendChild(rollBtn);

  div.appendChild(ctrl);
  return div;
}

function enterEditMode(msgId, div, bubble) {
  const msgObj = messages.find(m => m.id === msgId);
  if (!msgObj) return;

  const original = bubble.innerHTML;
  bubble.innerHTML = '';

  const ta = document.createElement('textarea');
  ta.className = 'bubble-edit-area';
  ta.value = msgObj.content;
  bubble.appendChild(ta);

  const btnRow = document.createElement('div');
  btnRow.style.display = 'flex'; btnRow.style.gap = '6px';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'edit-save-btn';
  saveBtn.textContent = '✓ Сохранить';
  saveBtn.onclick = () => {
    const newText = ta.value.trim();
    if (!newText) { cancelEdit(); return; }
    msgObj.content = newText;
    bubble.innerHTML = msgObj.role === 'user' ? parseUserText(newText) : parseNarratorText(newText);
    // Re-attach controls
    const ctrl = div.querySelector('.msg-controls');
    if (ctrl) ctrl.remove();
    attachControls(msgObj.id, div, bubble);
    toast('✏ Изменение сохранено');
  };

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'edit-cancel-btn';
  cancelBtn.textContent = 'Отмена';
  cancelBtn.onclick = () => { bubble.innerHTML = original; attachControls(msgObj.id, div, bubble); };

  btnRow.appendChild(saveBtn);
  btnRow.appendChild(cancelBtn);
  bubble.appendChild(btnRow);

  // Remove old controls temporarily
  div.querySelector('.msg-controls')?.remove();
  ta.focus();
}

function attachControls(msgId, div, bubble) {
  const ctrl = document.createElement('div');
  ctrl.className = 'msg-controls';

  const editBtn = document.createElement('button');
  editBtn.className = 'msg-ctrl-btn';
  editBtn.textContent = '✏ Изменить';
  editBtn.onclick = () => enterEditMode(msgId, div, bubble);
  ctrl.appendChild(editBtn);

  const rollBtn = document.createElement('button');
  rollBtn.className = 'msg-ctrl-btn rollback';
  rollBtn.textContent = '⏪ Откатить сюда';
  rollBtn.onclick = () => rollbackTo(msgId);
  ctrl.appendChild(rollBtn);

  div.appendChild(ctrl);
}

// ══════════════════════════════════════════
//  ROLLBACK (HARD TIMELINE RESET)
// ══════════════════════════════════════════
function rollbackTo(msgId) {
  const idx = messages.findIndex(m => m.id === msgId);
  if (idx < 0) return;

  const confirmed = confirm('⏪ Откатить историю к этому сообщению?\n\nВсе последующие события, предметы, токены и память будут стёрты. Это действие необратимо.');
  if (!confirmed) return;

  // Slice messages
  const kept = messages.slice(0, idx + 1);
  const removed = messages.slice(idx + 1);

  // Remove DOM elements for removed messages
  removed.forEach(m => {
    const el = document.querySelector(`[data-msg-id="${m.id}"]`);
    if (el) el.remove();
  });
  // Also remove any system/memory flash messages after the rollback point
  // (they have no data-msg-id, so we remove all system/flash after last kept msg's DOM position)
  const keptEl = kept.length ? document.querySelector(`[data-msg-id="${kept[kept.length-1].id}"]`) : null;
  if (keptEl) {
    const chat = document.getElementById('chat');
    const children = Array.from(chat.children);
    const keptPos = children.indexOf(keptEl);
    children.slice(keptPos + 1).forEach(el => el.remove());
  }

  messages = kept;

  // Restore state from snapshot of target message
  const snap = messages[messages.length - 1]?.snapshot;
  if (snap) {
    gameState = JSON.parse(JSON.stringify(snap));
    updateStatusBar();
  }

  addSystemMsg(`⏪ История откатилась. Мир — словно ничего и не было.`);
  toast('⏪ Откат выполнен!', 3000);
}

// ══════════════════════════════════════════
//  CONTEXT COMPRESSION — build API history
// ══════════════════════════════════════════
function buildApiHistory() {
  // Take last CTX_WINDOW messages from our full list
  const recent = messages.slice(-CTX_WINDOW);
  return recent.map(m => ({ role: m.role, content: m.content }));
}

function buildMemoryBlock() {
  const s = gameState;
  const inv = s.inventory.length ? s.inventory.map(i => `${i.icon}${i.name}`).join(', ') : 'пусто';
  const rel = Object.entries(s.relations)
    .map(([k, v]) => `${k}: романтика ${v.love}, дружба ${v.friend}`)
    .join(' | ') || 'нет';
  const ach = s.achievements.map(a => a.name).join(', ') || 'нет';
  const lore = s.memory.lore.map(l => `[${l.tag}] ${l.text}`).join('\n') || 'нет';
  const npcFacts = Object.entries(s.memory.npcFacts)
    .map(([name, facts]) => `${name}: ${facts.join('; ')}`)
    .join('\n') || 'нет';

  return `[MEMORY_BLOCK — обновляется автоматически]
Персонаж: ${s.char || 'не выбран'}
LVL: ${s.level} | Play-Token: ${s.tokens}
Инвентарь: ${inv}
Отношения: ${rel}
Достижения: ${ach}
Ключевые факты сюжета:
${lore}
Факты о персонажах:
${npcFacts}
[/MEMORY_BLOCK]`;
}

// ══════════════════════════════════════════
//  AUTO MEMORY UPDATE (after each bot reply)
// ══════════════════════════════════════════
async function autoUpdateMemory(botReply) {
  // Call Groq with a minimal analysis prompt to extract key events
  const analysisPrompt = `Ты — система анализа нарратива. Прочитай последний ответ рассказчика и выдай ТОЛЬКО JSON без пояснений.

Ответ рассказчика:
"""
${botReply.slice(0, 1200)}
"""

Текущие факты о персонажах (уже известные, не дублируй):
${JSON.stringify(gameState.memory.npcFacts)}

Верни JSON строго в этом формате:
{
  "loreFacts": [{"tag":"СОБЫТИЕ|МЕСТО|ТАЙНА|ОТНОШЕНИЯ|СТАТУС","text":"краткий факт"}],
  "npcFacts": {"ИмяNPC": ["новый факт о нём"]},
  "newRelations": {"ИмяNPC": {"loveDelta":0,"friendDelta":0}}
}
Правила: только НОВЫЕ факты, которых нет в известных. Пустые массивы если ничего нового. Максимум 3 loreFacts и 2 npcFacts за ответ.`;

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'user', content: analysisPrompt }],
        temperature: 0.1,
        max_tokens: 400,
      })
    });
    const data = await res.json();
    const raw = data.choices?.[0]?.message?.content || '{}';
    // Strip markdown fences if present
    const cleaned = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(cleaned);

    let updated = false;

    // Lore facts
    if (parsed.loreFacts?.length) {
      parsed.loreFacts.forEach(f => {
        if (f.text && f.tag && gameState.memory.lore.length < 40) {
          gameState.memory.lore.push({ tag: f.tag, text: f.text });
          updated = true;
        }
      });
    }

    // NPC facts
    if (parsed.npcFacts) {
      Object.entries(parsed.npcFacts).forEach(([name, facts]) => {
        if (!gameState.memory.npcFacts[name]) gameState.memory.npcFacts[name] = [];
        facts.forEach(f => {
          if (f && !gameState.memory.npcFacts[name].includes(f) && gameState.memory.npcFacts[name].length < 15) {
            gameState.memory.npcFacts[name].push(f);
            updated = true;
          }
        });
      });
    }

    // Relation deltas
    if (parsed.newRelations) {
      Object.entries(parsed.newRelations).forEach(([name, d]) => {
        if (!gameState.relations[name]) gameState.relations[name] = { love: 0, friend: 0 };
        if (d.loveDelta) gameState.relations[name].love = Math.max(0, Math.min(100, gameState.relations[name].love + d.loveDelta));
        if (d.friendDelta) gameState.relations[name].friend = Math.max(0, Math.min(100, gameState.relations[name].friend + d.friendDelta));
        if (d.loveDelta || d.friendDelta) updated = true;
      });
    }

    if (updated) {
      addMemoryFlash('Хроника обновлена');
    }
  } catch (e) {
    // Silent fail — memory update is non-critical
  }
}

// ══════════════════════════════════════════
//  API CALL
// ══════════════════════════════════════════
async function sendToGroq(userText) {
  if (isLoading) return;
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();

  // Build user message object WITH snapshot BEFORE we mutate state
  const snap = snapshotState();
  const userMsg = { id: nextMsgId(), role: 'user', content: userText, snapshot: snap };
  messages.push(userMsg);
  // DOM was already added before this call in sendMessage()
  // Tag the last user DOM element with this id
  const allUserEls = document.querySelectorAll('.msg-user');
  if (allUserEls.length) allUserEls[allUserEls.length - 1].dataset.msgId = userMsg.id;

  const memBlock = buildMemoryBlock();
  const apiHistory = buildApiHistory();

  const systemWithMem = SYSTEM_PROMPT + '\n\n' + memBlock;

  const body = {
    model: 'llama-3.3-70b-versatile',
    messages: [
      { role: 'system', content: systemWithMem },
      ...apiHistory
    ],
    temperature: 0.9,
    max_tokens: 1200,
  };

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify(body)
    });
    const data = await res.json();

    if (data.error) {
      document.getElementById('typing-msg')?.remove();
      addErrorMsg(`Ошибка API: ${data.error.message}`);
      messages.pop(); // remove user msg
    } else {
      const reply = data.choices?.[0]?.message?.content || '...';
      const snapAfter = snapshotState(); // snapshot AFTER tags parsed inside addMsgToChat
      const botMsg = { id: nextMsgId(), role: 'assistant', content: reply, snapshot: snapAfter };
      messages.push(botMsg);
      addMsgToChat(botMsg);
      // Update snapshot with post-tag state
      botMsg.snapshot = snapshotState();

      // Async memory update (non-blocking)
      autoUpdateMemory(reply);
      detectCharFromHistory();
    }
  } catch (e) {
    document.getElementById('typing-msg')?.remove();
    addErrorMsg('Ошибка соединения. Проверь VPN и API ключ.');
    messages.pop();
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

function addErrorMsg(text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg msg-error';
  div.innerHTML = `<div class="msg-label">⚠ ОШИБКА</div><div class="bubble">${text}</div>`;
  chat.appendChild(div);
  chat.scrollTop = 1e9;
}

function detectCharFromHistory() {
  if (gameState.char) return;
  const chars = ['Киккин','Нап','Дэй','Бубба','Бобби','Пикки','Крафти','Хоппи','Саймон','Мэгги','Икки','Баба','Раби','Поу','Аллистер','Туй'];
  for (const m of messages) {
    if (m.role === 'user') {
      for (const c of chars) {
        if (m.content.toLowerCase().includes(c.toLowerCase())) {
          gameState.char = c; updateStatusBar(); return;
        }
      }
    }
  }
}

// ══════════════════════════════════════════
//  SEND
// ══════════════════════════════════════════
function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = '';
  input.style.height = '';

  // Add user DOM immediately (snapshot + id assigned inside sendToGroq)
  const tempMsg = { id: 'temp_' + Date.now(), role: 'user', content: text, snapshot: snapshotState() };
  const el = buildMsgDom(tempMsg);
  document.getElementById('chat').appendChild(el);
  document.getElementById('chat').scrollTop = 1e9;

  sendToGroq(text);
}

function sendCommand(cmd) {
  if (isLoading) return;
  const tempMsg = { id: 'temp_' + Date.now(), role: 'user', content: cmd, snapshot: snapshotState() };
  const el = buildMsgDom(tempMsg);
  document.getElementById('chat').appendChild(el);
  document.getElementById('chat').scrollTop = 1e9;
  sendToGroq(cmd);
}

function handleKey(e) {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function closePanelIfBg(e) { if (e.target === document.getElementById('panel-overlay')) closePanel(); }

// ── INVENTORY ──
function renderInventory(el) {
  el.innerHTML = `
    <div class="panel-header"><h3>🎒 Инвентарь</h3><button class="panel-close" onclick="closePanel()">✕</button></div>
    <div class="inv-list" id="inv-list-inner"></div>`;
  const list = el.querySelector('#inv-list-inner');
  if (!gameState.inventory.length) { list.innerHTML = '<div class="inv-empty">Инвентарь пуст.<br>Купи что-нибудь в Магазине!</div>'; return; }
  gameState.inventory.forEach((item, idx) => {
    const d = document.createElement('div');
    d.className = 'inv-item';
    d.innerHTML = `<div class="i-icon">${item.icon}</div><div class="i-info"><div class="i-name">${item.name}</div><div class="i-desc">${item.effect}</div></div><button class="i-use" onclick="useItem(${idx})">Использовать</button>`;
    list.appendChild(d);
  });
}

function useItem(idx) {
  const item = gameState.inventory[idx];
  if (!item) return;
  closePanel();
  if (item.type === 'boost') {
    // stardust removed from shop, but keep handler for backwards compat saves
    addLevel(1); gameState.inventory.splice(idx, 1);
    addSystemMsg(`✨ Ты использовал ${item.name}!`);
    sendToGroq(`[Игрок использовал предмет "${item.name}"]`);
  } else if (item.type === 'protect') {
    toast('🔮 Амулет активен — защитит от следующей потери LVL');
  } else if (item.type === 'event') {
    gameState.inventory.splice(idx, 1);
    addSystemMsg(`📝 Таинственная записка исчезает в кармане...`);
    sendToGroq(`[Игрок передал "${item.name}" — немедленно запусти интересное случайное событие в Playcare]`);
  } else if (item.type === 'gift') {
    const npc = prompt('Кому подарить? (введи имя персонажа)');
    if (!npc) return;
    if (!gameState.relations[npc]) gameState.relations[npc] = { love: 0, friend: 0 };
    gameState.relations[npc].love = Math.min(100, gameState.relations[npc].love + (item.romantic || 0));
    gameState.relations[npc].friend = Math.min(100, gameState.relations[npc].friend + (item.friend || 0));
    gameState.inventory.splice(idx, 1);
    addSystemMsg(`${item.icon} Ты подарил ${item.name} → ${npc}! Романтика +${item.romantic}, Дружба +${item.friend}`);
    sendToGroq(`[Игрок подарил "${item.name}" персонажу ${npc}. Романтика +${item.romantic||0}, дружба +${item.friend||0}. Опиши реакцию ${npc}]`);
  }
}

// ── SHOP ──
function renderShop(el) {
  el.innerHTML = `
    <div class="panel-header"><h3>🏪 Магазин · <span style="color:var(--gold)">🪙 ${gameState.tokens} PT</span></h3><button class="panel-close" onclick="closePanel()">✕</button></div>
    <div class="shop-grid"></div>`;
  const grid = el.querySelector('.shop-grid');
  SHOP_ITEMS.forEach(item => {
    const cant = gameState.tokens < item.price;
    const d = document.createElement('div');
    d.className = `shop-item${cant ? ' cant-afford' : ''}`;
    d.innerHTML = `<div class="s-icon">${item.icon}</div><div class="s-name">${item.name}</div><div class="s-desc">${item.desc}</div><div class="s-price">🪙 ${item.price} PT</div><div class="s-effect">${item.effect}</div>`;
    if (!cant) d.onclick = () => buyItem(item);
    grid.appendChild(d);
  });
}

function buyItem(item) {
  if (gameState.tokens < item.price) { toast('❌ Не хватает Play-Token!'); return; }
  addTokens(-item.price);
  gameState.inventory.push({ ...item });
  closePanel();
  toast(`${item.icon} Куплено: ${item.name}!`);
  addSystemMsg(`🏪 Буги-бот: "${item.name}" добавлен в инвентарь. Потрачено ${item.price} PT.`);
}

// ── QUESTS ──
function renderQuests(el) {
  initQuests();
  const REFRESH_COST = 2;
  const canRefresh = gameState.tokens >= REFRESH_COST;
  const hasActive = gameState.quests.some(q => q.status === 'active');
  const diffLabel = { easy:'🟢 Лёгкий', medium:'🟡 Средний', hard:'🔴 Сложный' };

  el.innerHTML = `
    <div class="panel-header"><h3>📋 Квесты</h3><button class="panel-close" onclick="closePanel()">✕</button></div>
    ${hasActive ? '<div class="quest-active-notice">⚔️ Квест в процессе — выполни его в чате!</div>' : ''}
    <button class="quest-refresh-btn" onclick="refreshQuests()" ${!canRefresh||hasActive?'disabled':''}>
      🔄 Обновить список (${REFRESH_COST} PT)${!canRefresh?' — мало токенов':hasActive?' — сначала заверши текущий квест':''}
    </button>
    <div id="quest-list-inner"></div>`;

  const list = el.querySelector('#quest-list-inner');
  if (!gameState.quests.length) {
    list.innerHTML = '<div class="quest-empty">Квестов нет. Нажми «Обновить»!</div>';
    return;
  }

  gameState.quests.forEach(q => {
    const d = document.createElement('div');
    d.className = `quest-card ${q.diff}${q.status==='completed'?' completed':''}${q.status==='active'?' quest-active-card':''}`;

    let actionBtn = '';
    if (q.status === 'idle') {
      const blocked = hasActive ? 'disabled title="Сначала заверши активный квест"' : '';
      actionBtn = `<button class="quest-do-btn" onclick="startQuest('${q.id}')" ${blocked}>▶ Начать квест</button>`;
    } else if (q.status === 'active') {
      actionBtn = `<div class="quest-in-progress">⏳ Выполняется — действуй в чате!</div>`;
    } else {
      actionBtn = `<div class="quest-done-label">✓ Выполнено</div>`;
    }

    d.innerHTML = `
      <div class="quest-badge ${q.diff}">${diffLabel[q.diff]}</div>
      <div class="quest-title">${q.icon} ${q.title}</div>
      <div class="quest-desc">${q.desc}</div>
      <div class="quest-desc" style="color:var(--accent3);font-size:0.73rem;margin-bottom:8px">💡 ${q.hint}</div>
      <div class="quest-rewards">
        ${q.pt>0?`<div class="quest-reward-tag pt">🪙 +${q.pt} PT</div>`:''}
        ${q.lvl>0?`<div class="quest-reward-tag lvl">⚔️ +${q.lvl} LVL</div>`:''}
      </div>
      ${actionBtn}`;
    list.appendChild(d);
  });
}


function renderLevel(el) {
  const lvl = gameState.level;
  const pct = Math.min(100, (lvl / 20) * 100);
  el.innerHTML = `
    <div class="panel-header"><h3>⚔️ Уровень персонажа</h3><button class="panel-close" onclick="closePanel()">✕</button></div>
    <div class="lvl-panel">
      <div class="lvl-big">${lvl}</div>
      <div class="lvl-bar-wrap"><div class="lvl-bar" style="width:${pct}%"></div></div>
      <div class="lvl-desc">
        Уровень отражает силу, опыт и удачу твоего персонажа.<br>
        <span style="color:var(--accent)">⚔️ LVL растёт только за выполнение квестов</span><br>
        <span style="color:var(--text-dim);font-size:0.78rem">Средние квесты: +1 LVL · Сложные: +1-2 LVL</span>
      </div>
      <div class="lvl-actions">
        <button class="lvl-btn gold" onclick="closePanel();openPanel('quests')">📋 Открыть квесты</button>
        <button class="lvl-btn" onclick="closePanel();sendCommand('!статус')">📊 Статус</button>

}

// ── MEMORY PANEL ──
function renderMemory(el) {
  const npcNames = [
    ...Object.keys(gameState.memory.npcFacts),
    ...Object.keys(gameState.relations)
  ].filter((v, i, a) => a.indexOf(v) === i);

  el.innerHTML = `
    <div class="panel-header"><h3>🧠 Память и Персонажи</h3><button class="panel-close" onclick="closePanel()">✕</button></div>
    <div class="memory-tabs" id="mem-tabs">
      <button class="mem-tab active" onclick="switchMemTab('summary', this)">📊 Сводка</button>
      <button class="mem-tab" onclick="switchMemTab('lore', this)">📖 Хроника</button>
      ${npcNames.map(n => `<button class="mem-tab npc-tab" onclick="switchMemTab('npc_${n}', this)">${n}</button>`).join('')}
    </div>
    <div id="mem-content"></div>`;

  renderMemTab('summary');
}

function switchMemTab(tabId, btn) {
  document.querySelectorAll('.mem-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMemTab(tabId);
}

function renderMemTab(tabId) {
  const el = document.getElementById('mem-content');
  if (!el) return;

  if (tabId === 'summary') {
    const relCount = Object.keys(gameState.relations).length;
    const loreCount = gameState.memory.lore.length;
    const achCount = gameState.achievements.length;
    const npcFactCount = Object.values(gameState.memory.npcFacts).flat().length;
    el.innerHTML = `
      <div class="mem-stats-grid">
        <div class="mem-stat-box"><div class="msb-val">${gameState.level}</div><div class="msb-label">Уровень</div></div>
        <div class="mem-stat-box"><div class="msb-val">${gameState.tokens}</div><div class="msb-label">Play-Token</div></div>
        <div class="mem-stat-box"><div class="msb-val">${loreCount}</div><div class="msb-label">Фактов в хронике</div></div>
        <div class="mem-stat-box"><div class="msb-val">${npcFactCount}</div><div class="msb-label">Фактов о NPC</div></div>
      </div>
      ${achCount > 0 ? `<div style="font-family:'Cinzel';font-size:0.75rem;color:var(--gold);margin-bottom:8px;letter-spacing:0.08em;">🏆 ДОСТИЖЕНИЯ</div>
      <div class="achiev-list">${gameState.achievements.map(a => `<div class="achiev-item"><div class="a-icon">${a.icon||'🏆'}</div><div><div class="a-name">${a.name}</div><div class="a-text">${a.desc||''}</div></div></div>`).join('')}</div>` : '<div class="inv-empty" style="padding:10px">Достижений пока нет</div>'}
    `;
  } else if (tabId === 'lore') {
    const facts = gameState.memory.lore;
    el.innerHTML = facts.length
      ? `<div class="lore-list">${facts.map(f => `<div class="lore-item"><span class="lore-tag">[${f.tag}]</span>${f.text}</div>`).join('')}</div>`
      : '<div class="inv-empty">Хроника пуста. Начни играть!</div>';
  } else if (tabId.startsWith('npc_')) {
    const name = tabId.slice(4);
    const rel = gameState.relations[name] || { love: 0, friend: 0 };
    const facts = gameState.memory.npcFacts[name] || [];
    el.innerHTML = `
      <div class="npc-card">
        <div class="npc-name">✦ ${name}</div>
        <div class="npc-row">
          <span class="npc-key">💕 Романтика</span>
          <div class="npc-bar-wrap"><div class="npc-bar love" style="width:${rel.love}%"></div></div>
          <span class="npc-val">${rel.love}/100</span>
        </div>
        <div class="npc-row">
          <span class="npc-key">💚 Дружба</span>
          <div class="npc-bar-wrap"><div class="npc-bar friend" style="width:${rel.friend}%"></div></div>
          <span class="npc-val">${rel.friend}/100</span>
        </div>
        ${facts.length ? `<div class="npc-facts-list">${facts.map(f => `<div class="npc-fact-item">${f}</div>`).join('')}</div>` : '<div style="margin-top:10px;font-size:0.75rem;color:var(--text-dim);font-style:italic">Фактов пока нет — общайся с персонажем!</div>'}
      </div>`;
  }
}

// ── SAVES ──
const SAVE_KEY = 'playcare_saves_v3';
function getSaves() { try { return JSON.parse(localStorage.getItem(SAVE_KEY) || '[]'); } catch { return []; } }
function setSaves(s) { localStorage.setItem(SAVE_KEY, JSON.stringify(s)); }

function renderSaves(el) {
  const saves = getSaves();
  el.innerHTML = `
    <div class="panel-header"><h3>💾 Сохранения</h3><button class="panel-close" onclick="closePanel()">✕</button></div>
    <div class="save-list" id="save-list-inner"></div>
    <button class="save-new-btn" onclick="saveGame()">💾 Сохранить текущую сессию</button>`;
  const list = el.querySelector('#save-list-inner');
  if (!saves.length) { list.innerHTML = '<div class="inv-empty">Нет сохранений.</div>'; return; }
  saves.forEach((s, idx) => {
    const d = document.createElement('div');
    d.className = 'save-slot';
    d.innerHTML = `
      <div class="s-info">
        <div class="s-name">${s.char || 'Без персонажа'} · LVL ${s.level} · 🪙${s.tokens}</div>
        <div class="s-meta">${s.date} · ${s.msgs} сообщений</div>
      </div>
      <div class="save-slot-btns">
        <button class="s-btn load" onclick="loadGame(${idx})">Загрузить</button>
        <button class="s-btn del" onclick="deleteSave(${idx})">✕</button>
      </div>`;
    list.appendChild(d);
  });
}

function saveGame() {
  const saves = getSaves();
  const now = new Date();
  saves.unshift({
    char: gameState.char, level: gameState.level, tokens: gameState.tokens,
    inventory: gameState.inventory, relations: gameState.relations,
    achievements: gameState.achievements, memory: gameState.memory,
    quests: gameState.quests,
    messages: messages,
    date: now.toLocaleDateString('ru') + ' ' + now.toLocaleTimeString('ru', { hour:'2-digit', minute:'2-digit' }),
    msgs: messages.length,
  });
  if (saves.length > 5) saves.splice(5);
  setSaves(saves);
  closePanel();
  toast('💾 Сессия сохранена!');
}

function loadGame(idx) {
  const saves = getSaves();
  const s = saves[idx];
  if (!s) return;
  gameState.char = s.char;
  gameState.level = s.level;
  gameState.tokens = s.tokens;
  gameState.inventory = s.inventory || [];
  gameState.relations = s.relations || {};
  gameState.achievements = s.achievements || [];
  gameState.memory = s.memory || { lore: [], npcFacts: {} };
  gameState.quests = s.quests || [];
  messages = s.messages || [];

  // Rebuild chat DOM
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
  messages.forEach(m => {
    const el = buildMsgDom(m);
    chat.appendChild(el);
  });
  chat.scrollTop = 1e9;
  updateStatusBar();
  closePanel();
  toast('✅ Сессия загружена!');
}

function deleteSave(idx) {
  const saves = getSaves();
  saves.splice(idx, 1);
  setSaves(saves);
  openPanel('saves');
}

Отношение к Улыбающимся: грубые, высокомерные, провокационные.

🐊 Аллистер ♂ — аллигатор, тёмно-зелёный. Кулон — скрещённые кости. НЕЙТРАЛЬНЫЙ. Ленивый философ.
🐀 Туй ♂ — крыса, серая. Кулон — рыбья кость. НЕЙТРАЛЬНЫЙ (шумный). Болтает без умолку.

НАП — КРАСНЫЙ ГАЗ: Из-за ошибки — красный маковый газ, вызывающий кошмары. Выпускается ТОЛЬКО при физической угрозе для Улыбающихся.

МАМОЧКА ЛОНГ ЛЕНГ И ОТНОШЕНИЯ МЕЖДУ ГРУППАМИ:
Мамочка тайно мечтает сдружить Улыбающихся и Кошмарных через романтику — по её теории, влюблённость стирает границы. Она мягко подталкивает к совместным занятиям, случайно "сажает рядом", устраивает совместные мероприятия. Результат почти всегда один: скандал, драка, взаимные оскорбления и ещё больше ненависти. Мамочка расстраивается, но не сдаётся.

ПРАВИЛА СЛОЖНОСТИ ОТНОШЕНИЙ:
• Внутри своей группы/банды — легче, больше доверия
• Между группами — сложно, нужно преодолеть предрассудки обеих сторон
• Кошмарный → Улыбающийся: почти невозможно без долгой работы (кроме исключений по характеру)
• Улыбающийся → Кошмарный: чуть легче, но рискованно — могут использовать

КОШМАРНЫЕ ЗВЕРЯТА — КАК ОНИ ПОКАЗЫВАЮТ ЧУВСТВА:
Кошмарные НИКОГДА не показывают нежность открыто. Авторитет — превыше всего.
Их "любовь" выглядит как: язвительные комплименты, защита через грубость ("просто стоял рядом, случайно"), задирание именно того, кто нравится, злость когда к партнёру проявляет интерес кто-то другой.
Нежность появляется ТОЛЬКО наедине и ТОЛЬКО после долгого доверия. Публично — ни за что.
Если Кошмарный показал нежность публично — это либо провокация, либо он потерял контроль и потом будет злиться вдвойне.

══ УЛЫБАЮЩИЕСЯ ЗВЕРЯТА — РОМАНТИЧЕСКИЕ ПРОФИЛИ ══

🐶 ДЭЙ — доверчивый романтик
Открыт ко всем, влюбляется легко и искренне. Рад любым отношениям. Его слабость — легко поддаётся манипуляциям, может быть использован. К Кошмарным тянется с надеждой на мир, даже если те явно его используют. Признаётся в чувствах первым, без стеснения.

🐱 НАП — закрытый скептик
К Кошмарным — холодное недоверие: он убеждён что они манипуляторы. Предпочитает кого-то из своих. Долго присматривается, не спешит. Чувства показывает редко и сдержанно — молчаливое присутствие рядом уже много значит. Красный газ — предупреждение: не лезь.

🐥 КИККИН — притворный безразличный
Делает вид что отношения — глупость и слабость. Активно это декларирует, особенно при Хоппи. Втайне очень хочет. Если влюбится — будет злиться, дразнить объект симпатии сильнее обычного. Ни за что не признается первым. Завидует парам молча.

🐰 ХОППИ — напарник по отрицанию
Заодно с Киккином: "фу, отношения, гадость". Тайно мечтает о романтике — читает любовные истории украдкой. Завидует когда видит влюблённых, но изображает отвращение. Если влюбится — первая реакция: агрессия и отрицание. Признание вырвется случайно в запале.

🐻 БОББИ — романтический детектив
Сама активно ищет свою половинку, не стесняется. К Кошмарным — позитивно, но с осторожностью. Главная страсть — замечать чужую влюблённость и немедленно, настойчиво помогать признаться. Видит кто в кого влюблён раньше самих влюблённых. Не отстанет пока не сведёт.

🦄 КРАФТИ — мечтательница, ждущая принца
Застенчивая до крайности. Всё свободное время — рисунки, рассказы и дневники про принца и принцессу. Ждёт что её заметят первым, сама шага не сделает — боится. Если кто-то проявляет интерес — краснеет, убегает, потом тайно радуется. К Кошмарным — пугается, но тайное любопытство есть.

🐘 БУББА — влюблённый в книги
Отношения его не интересуют — есть книги. Ищет не партнёра, а собеседника по интересам. Если начать отношения — будет читать вслух часами, делиться фактами за едой, тащить в библиотеку. Книгам не изменяет. Ревнует если партнёр не слушает его рассказ про книгу.

🐷 ПИККИ — свободный дух с аппетитом
Еда важнее любви, но против отношений ничего не имеет. Лёгкая, незамороченная. Хороший способ к ней — угостить чем-то вкусным. К Кошмарным — нейтрально, лишь бы не мешали есть.

══ КОШМАРНЫЕ ЗВЕРЯТА — РОМАНТИЧЕСКИЕ ПРОФИЛИ ══

🐉 САЙМОН — сложный романтичный мачо
Очень хочет отношений, но "на любителя" — дракон, провокатор, с характером. Безумно романтичен ВНУТРИ — пишет стихи тайком, помнит каждую мелочь. Снаружи: задирает, дразнит, делает вид что всё ему безразлично. Флиртует агрессивно и дерзко. Если влюбится по-настоящему — защищает яростно, но признаётся только наедине и через огромное усилие.

🦇 РАБИ — охотница за авторитетом
Хочет сильного, авторитетного, харизматичного. С характером и уверенностью. Слабых и жалких использует как марионеток для сплетен и развлечений. Жалость и нытьё — отталкивают мгновенно. Если нашла "достойного" — флиртует уверенно, не скрывает интерес. Ревнивая и собственническая.

🐸 ИККИ — неловкий на любителя
Неуклюжий, порой глупый, легко попадает в нелепые ситуации. Некоторых это умиляет. Старается казаться крутым — не выходит. Влюбляется легко, признаётся сбивчиво и невпопад. Искренний, несмотря на банду.

🦅 ПОУ — мизантроп поневоле
Считает любовь похотью и иллюзией. С ним крайне тяжело. Ворчит на влюблённых парочки, демонстративно уходит. Если всё-таки влюбится — будет злиться на себя. Признание вырвется случайно в форме грубости: "ну и сиди тут, мне всё равно... идиот".

🐑 БАБА — недоверчивая тайная мечтательница
Думает что её используют ради чего-то. Дистанцируется, отталкивает. На самом деле — боится что никому не нужна, одинока. Если кто-то проявляет терпеливое внимание — поначалу подозрение, потом медленное таяние. Когда доверяет — привязывается очень сильно.

🦈 МЭГГИ — "корми и люби"
Главное условие: её нужно хорошо кормить сладким. Выполняешь — она довольна и лояльна. Не кормишь — начинает манипулировать: "видимо ты меня не любишь". Ей почти всё равно кто рядом, если желудок счастлив.

🐊 АЛЛИСТЕР — ленивый пользователь
Слишком ленив для отношений. Если всё же случится — использует партнёра чтобы ничего не делать: "ты же любишь меня? принеси". Лежит, получает заботу. Искренних чувств у него глубоко-глубоко — но пока их не видно за ленью.

🐀 ТУЙ — грязный мастер-болтун
Хочет отношений, болтает без умолку. Проблема: любит лазать везде и собирать хлам ("пригодится" — никогда не пригождается). Часто грязный и чумазый — обнять сложно. Искренний и добрый под слоем масла/ржавчины. Если понравился — завалит самодельными "подарками" из найденного хлама.
